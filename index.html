<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Radio Joven Katuete - A rádio que Katueté ouve! Transmissão ao vivo 24h." />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Radio Joven Katuete – Ao Vivo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

<body>

  <!-- ========== HEADER ========== -->
  <header class="site-header">
    <div class="logo-wrap">
      <img src="radiojovenlogo.png" alt="Logo Radio Joven Katuete" class="logo" />
    </div>
    <p class="locutor">🎙️ Locutor: <strong>Junior Bessing</strong></p>
  </header>

  <!-- ========== MAIN PLAYER ========== -->
  <main class="player-section">

    <!-- Live Badge -->
    <div class="live-badge">
      <span class="live-dot"></span>
      AO VIVO
    </div>

    <!-- Station Name -->
    <h1 class="station-name">Radio Joven Katuete</h1>
    <p class="station-tagline">A rádio que Katueté ouve!</p>

    <audio id="radio-audio" preload="auto"></audio>

    <!-- Play Button -->
    <button id="play-btn" class="play-btn" aria-label="Reproduzir rádio">
      <svg id="icon-play" class="btn-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg id="icon-pause" class="btn-icon hidden" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <!-- Status Text -->
    <p id="status-text" class="status-text">Pressione Play para sintonizar</p>

    <!-- Equalizer Bars (visible only when playing) -->
    <div id="equalizer" class="equalizer hidden" aria-hidden="true">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <!-- Volume Control -->
    <div class="volume-wrap">
      <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="1" class="volume-slider" aria-label="Volume" />
    </div>

  </main>

  <!-- ========== ADVERTISING BANNER ========== -->
  <section class="ad-section">
    <a
      href="https://wa.me/595983921153"
      target="_blank"
      rel="noopener noreferrer"
      class="ad-banner"
      aria-label="Anuncie na Radio Joven Katuete via WhatsApp"
    >
      <span class="ad-icon">📢</span>
      <span class="ad-text">
        <strong>ANUNCIE AQUI</strong><br />
        Dê visibilidade à sua marca na rádio que Katueté ouve!
      </span>
      <span class="ad-cta">Fale<br />Conosco</span>
    </a>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <p>© 2025 Radio Joven Katuete &nbsp;|&nbsp; Katueté, Paraguay</p>
    <p class="footer-sub">Todos os direitos reservados.</p>
  </footer>

  <!-- ========== WHATSAPP FLOATING BUTTON ========== -->
  <a
    href="https://wa.me/595983921153"
    target="_blank"
    rel="noopener noreferrer"
    class="wa-float"
    aria-label="Fale Conosco pelo WhatsApp"
  >
    <svg class="wa-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="16" fill="#25D366"/>
      <path fill="#fff" d="M22.9 9.1A9.8 9.8 0 0 0 16 6.2a9.8 9.8 0 0 0-8.5 14.7L6 26l5.3-1.4A9.8 9.8 0 0 0 16 25.8a9.8 9.8 0 0 0 9.8-9.8 9.8 9.8 0 0 0-2.9-6.9zm-6.9 15a8.1 8.1 0 0 1-4.1-1.1l-.3-.2-3.1.8.8-3-.2-.3A8.1 8.1 0 1 1 16 24.1zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.3 6.3 0 0 1-1.9-1.2 7 7 0 0 1-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4l-.7-1.7c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 0 0-.7.3 2.8 2.8 0 0 0-.9 2.1 4.9 4.9 0 0 0 1 2.6 11.2 11.2 0 0 0 4.3 3.8c.6.3 1.1.4 1.4.5.6.2 1.2.2 1.6.1.5-.1 1.4-.6 1.6-1.1.2-.5.2-1 .1-1.1l-.3-.2z"/>

    <span class="wa-label">Fale Conosco</span>

  <script src="script.js"></script>
